global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "auth-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:3000"]

  - job_name: "customer-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["customer-service:3000"]

  - job_name: "payments-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["payments-service:3000"]

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]
      